[package]
name = "rustkit-mcp"
version = "0.1.0"
edition = "2024"
description = "MCP proxy to reduce LLM token costs"
license = "MIT"
repository = "https://github.com/rustkit-ai/rustkit-mcp"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
anyhow = "1"
clap = { version = "4", features = ["derive"] }
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
tempfile = "3"
